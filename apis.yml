name: Google Cloud Spanner
description: >-
  Google Cloud Spanner is a fully managed, mission-critical relational database
  service that offers transactional consistency at global scale, automatic
  synchronous replication, and schemas with SQL support. It combines the benefits
  of relational database structure with non-relational horizontal scale, providing
  up to 99.999% availability.
