apis:
- name: Cloud Spanner API
  description: >-
    The Cloud Spanner API provides programmatic access to manage Cloud Spanner
    instances, databases, and sessions. It supports creating and configuring
    globally distributed database infrastructure, executing SQL queries and DML
    statements, managing transactions with strong consistency guarantees, and
    handling database backups and restore operations.
