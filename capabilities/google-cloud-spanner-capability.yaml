        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: instance
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteinstance
        method: DELETE
        description: Google Cloud Spanner Delete an instance
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: instance
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
