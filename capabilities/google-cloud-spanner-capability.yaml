    namespace: google-cloud-spanner
    baseUri: https://spanner.googleapis.com/v1
    description: Google Cloud Spanner API HTTP API.
    authentication:
      type: bearer
      token: '{{GOOGLE_CLOUD_SPANNER_TOKEN}}'
    resources:
    - name: projects-project-instances
      path: /projects/{project}/instances
      operations:
      - name: listinstances
        method: GET
        description: Google Cloud Spanner List instances
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
        - name: filter
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createinstance
        method: POST
        description: Google Cloud Spanner Create an instance
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
