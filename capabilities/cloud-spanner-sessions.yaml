naftiko: 1.0.0-alpha2
info:
  label: Google Cloud Spanner API — Sessions
  description: 'Google Cloud Spanner API — Sessions. 1 operations. Lead operation: Google Cloud Spanner Create a session.
    Self-contained Naftiko capability covering one Google Cloud Spanner business surface.'
  tags:
  - Google Cloud Spanner
  - Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_CLOUD_SPANNER_API_KEY: GOOGLE_CLOUD_SPANNER_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-spanner-sessions
    baseUri: https://spanner.googleapis.com/v1
    description: Google Cloud Spanner API — Sessions business capability. Self-contained, no shared references.
    resources:
    - name: projects-project-instances-instance-databases-database-sessions
      path: /projects/{project}/instances/{instance}/databases/{database}/sessions
      operations:
      - name: createsession
        method: POST
        description: Google Cloud Spanner Create a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: instance
          in: path
          type: string
          required: true
        - name: database
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GOOGLE_CLOUD_SPANNER_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-spanner-sessions-rest
    port: 8080
    description: REST adapter for Google Cloud Spanner API — Sessions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{project}/instances/{instance}/databases/{database}/sessions
      name: projects-project-instances-instance-databases-database-sessions
      description: REST surface for projects-project-instances-instance-databases-database-sessions.
      operations:
      - method: POST
        name: createsession
        description: Google Cloud Spanner Create a session
        call: cloud-spanner-sessions.createsession
        with:
          project: rest.project
          instance: rest.instance
          database: rest.database
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-spanner-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Cloud Spanner API — Sessions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: google-cloud-spanner-create-session
      description: Google Cloud Spanner Create a session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-spanner-sessions.createsession
      with:
        project: tools.project
        instance: tools.instance
        database: tools.database
      outputParameters:
      - type: object
        mapping: $.
